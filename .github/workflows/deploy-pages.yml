name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment_primary.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 35
    steps:
      - name: Deploy to GitHub Pages
        id: deployment_primary
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          reporting_interval: 10000

      - name: Wait before retrying transient Pages failure
        if: steps.deployment_primary.outcome == 'failure'
        run: sleep 60

      - name: Retry GitHub Pages deploy
        if: steps.deployment_primary.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          reporting_interval: 10000
