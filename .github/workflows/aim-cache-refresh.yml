name: Refresh AIM caches

on:
  schedule:
    # Weekday 8am / 4pm Central refreshes. GitHub schedules are UTC.
    # During CDT this lands at 13:05 / 21:05 UTC; DST drift is acceptable for now.
    - cron: "5 13,21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: aim-cache-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      cache_changed: ${{ steps.commit_caches.outputs.cache_changed }}
      cache_commit: ${{ steps.commit_caches.outputs.cache_commit }}
    env:
      SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
      ALPHA_VANTAGE_STOCK_API: ${{ secrets.ALPHA_VANTAGE_STOCK_API }}
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for name in SEC_EDGAR_USER_AGENT ALPHA_VANTAGE_STOCK_API EIA_API_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Refresh AIM cache pipeline
        run: |
          set -euo pipefail
          python3 scripts/run_aim_cache_pipeline.py \
            --online-market \
            --include-ai \
            --include-sec \
            --include-filing-text \
            --include-energy

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Guard private portfolio overlay from publication
        run: |
          set -euo pipefail
          if [ -e portfolio-cockpit-cache.json ]; then
            echo "Refusing to publish private portfolio overlay."
            exit 1
          fi
          if git ls-files --error-unmatch portfolio-cockpit-cache.json >/dev/null 2>&1; then
            echo "portfolio-cockpit-cache.json must never be tracked."
            exit 1
          fi
          echo "private portfolio overlay guard: clean"

      - name: Check generated public cache diff for secret-shaped values
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          import subprocess

          text = subprocess.check_output(
              ["git", "diff", "--", "aim-cache.json", "fred-cache.json", "market-cache.json", "market-history-cache.json"],
              text=True,
              errors="ignore",
          )
          patterns = [
              r"SEC_EDGAR_USER_AGENT",
              r"USER_AGENT",
              r"BWS_ACCESS_TOKEN",
              r"ALPHA.*KEY",
              r"FRED_API_KEY",
              r"EIA_API_KEY",
              r"api[_-]?key",
              r"secret",
              r"token",
              r"authorization",
          ]
          hits = [pattern for pattern in patterns if re.search(pattern, text, re.I)]
          if hits:
              raise SystemExit(f"Secret-shaped values found in public cache diff: {hits}")
          print("public cache diff secret sweep: clean")
          PY

      - name: Commit refreshed public caches
        id: commit_caches
        run: |
          set -euo pipefail
          if git diff --quiet -- aim-cache.json fred-cache.json market-cache.json market-history-cache.json; then
            echo "No public cache changes to commit."
            echo "cache_changed=false" >> "$GITHUB_OUTPUT"
            echo "cache_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aim-cache.json fred-cache.json market-cache.json market-history-cache.json
          git commit -m "chore: refresh AIM cache data"
          new_commit="$(git rev-parse HEAD)"
          for attempt in 1 2 3; do
            if git push; then
              echo "cache_changed=true" >> "$GITHUB_OUTPUT"
              echo "cache_commit=${new_commit}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push failed; rebasing onto latest origin/main before retry ${attempt}."
            git fetch origin main
            git rebase origin/main
            new_commit="$(git rev-parse HEAD)"
          done
          git push
          echo "cache_changed=true" >> "$GITHUB_OUTPUT"
          echo "cache_commit=${new_commit}" >> "$GITHUB_OUTPUT"

  deploy_pages_after_cache_refresh:
    name: Deploy Pages after cache refresh
    runs-on: ubuntu-latest
    needs: refresh
    if: needs.refresh.outputs.cache_changed == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Checkout refreshed cache commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.refresh.outputs.cache_commit }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000
          reporting_interval: 10000
