<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BTC Power Law">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="icon" href="data:,">
  <title>BTC Power Law Detail</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --text: #ffffff;
      --text-dim: #888888;
      --btc: #f7931a;
      --green: #00d395;
      --red: #ff6b6b;
      --blue: #4da6ff;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 12px 12px 8px;
    }
    
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .logo {
      width: 36px;
      height: 36px;
      background: var(--btc);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 700;
    }
    
    h1 { font-size: 18px; font-weight: 600; }
    .subtitle { font-size: 11px; color: var(--text-dim); }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }
    
    .price-section {
      text-align: center;
      padding: 4px 0 10px;
    }
    
    .price-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .price {
      font-size: 38px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    
    .price-change { font-size: 13px; margin-top: 2px; }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .metric {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }
    
    .metric-value { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
    .metric-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
    .power-law-value { color: var(--blue); }
    .source-row {
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      margin-top: 8px;
      line-height: 1.4;
    }
    .freshness-pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
    }
    .freshness-pill.fresh { color: var(--green); background: rgba(0,211,149,0.12); }
    .freshness-pill.stale { color: var(--red); background: rgba(255,107,107,0.12); }
    .model-note {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.45;
    }
    .model-note strong { color: var(--text); }
    
    .chart-card { cursor: pointer; position: relative; }
    .chart-card:active { opacity: 0.8; }
    .tap-hint {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 9px;
      color: var(--text-dim);
      background: rgba(0,0,0,0.4);
      padding: 3px 6px;
      border-radius: 4px;
    }
    
    .chart-container {
      position: relative;
      width: 100%;
      height: 150px;
      margin-bottom: 4px;
    }
    
    #chart, #modalChart { width: 100%; height: 100%; }
    
    .chart-title {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-align: center;
    }
    
    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 6px;
    }
    
    .legend-item { display: flex; align-items: center; gap: 3px; }
    .legend-dot { width: 6px; height: 6px; border-radius: 50%; }
    
    .gauge-section { display: flex; align-items: center; gap: 12px; }
    .gauge-wrap { flex: 1; }
    .gauge-label { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
    
    .gauge {
      height: 6px;
      background: linear-gradient(to right, var(--green), var(--blue), var(--red));
      border-radius: 3px;
      position: relative;
    }
    
    .gauge-marker {
      position: absolute;
      top: -5px;
      width: 16px;
      height: 16px;
      background: var(--text);
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
    
    .gauge-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    
    .status-badge {
      text-align: center;
      padding: 8px 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
    }
    
    .status-undervalued { background: rgba(0, 211, 149, 0.15); color: var(--green); }
    .status-fair { background: rgba(77, 166, 255, 0.15); color: var(--blue); }
    .status-overvalued { background: rgba(255, 107, 107, 0.15); color: var(--red); }
    
    .bands {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 10px;
    }
    
    .band {
      text-align: center;
      padding: 8px 4px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
    }
    
    .band-value { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .band-label { font-size: 9px; color: var(--text-dim); margin-top: 1px; text-transform: uppercase; }
    .band.support .band-value { color: var(--green); }
    .band.fair .band-value { color: var(--blue); }
    .band.resist .band-value { color: var(--red); }
    
    .footer { text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 6px; }
    .footer a { color: var(--btc); text-decoration: none; }
    
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    
    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }
    
    .nav-links a.active {
      color: var(--btc);
      background: rgba(247,147,26,0.15);
    }
    
    .loading { text-align: center; padding: 40px; color: var(--text-dim); }
    .error { background: rgba(255,107,107,0.1); color: var(--red); padding: 16px; border-radius: 12px; text-align: center; }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      z-index: 1000;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    
    .modal.active { display: flex; flex-direction: column; }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
    }
    
    .modal-title { font-size: 18px; font-weight: 600; }
    
    .modal-close {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    
    .modal-body {
      flex: 1;
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
    }
    
    .modal-chart-container {
      flex: 1;
      min-height: 300px;
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    
    .modal-chart-wrap {
      width: 100%;
      height: 100%;
    }
    
    .modal-info {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .modal-stat {
      background: var(--card);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }
    
    .modal-stat-value { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .modal-stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; }
    
    .modal-legend {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">₿</div>
      <div>
        <h1>BTC Power Law Detail</h1>
        <div class="subtitle">Long-term valuation model</div>
      </div>
    </header>
        <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="power-law.html" class="active">Power Law</a>
      <a href="macro.html">Macro</a>
    </div>
    <div id="app"><div class="loading">Loading...</div></div>
    <div class="footer">
      <span id="lastUpdate">—</span> · <a href="#" onclick="location.reload()">Refresh</a>
    </div>
  </div>
  
  <div id="modal" class="modal">
    <div class="modal-header">
      <div class="modal-title">Power Law Corridor</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-chart-container">
        <div class="modal-chart-wrap">
          <canvas id="modalChart"></canvas>
        </div>
      </div>
      <div class="modal-info" id="modalInfo"></div>
      <div class="modal-legend">
        <div class="legend-item"><span class="legend-dot" style="background:#00d395"></span> Support</div>
        <div class="legend-item"><span class="legend-dot" style="background:#4da6ff"></span> Conservative Fair</div>
        <div class="legend-item"><span class="legend-dot" style="background:rgba(255,255,255,0.45)"></span> Trend Anchor</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span> Resistance</div>
        <div class="legend-item"><span class="legend-dot" style="background:#f7931a"></span> Current Price</div>
      </div>
    </div>
  </div>

  <script>
    const GENESIS = new Date('2009-01-03T18:15:05Z');
    const PL_A = -17.01, PL_B = 5.82;
    const SUPPORT_MULT = 0.35, CONSERVATIVE_FAIR_MULT = 0.71, TREND_MULT = 1.0, RESIST_MULT = 3.5;
    
    const daysSinceGenesis = (d = new Date()) => (d - GENESIS) / 864e5;
    const powerLawPrice = days => Math.pow(10, PL_A + PL_B * Math.log10(days));
    const powerLawModel = days => {
      const trend = powerLawPrice(days);
      return {
        support: trend * SUPPORT_MULT,
        conservativeFair: trend * CONSERVATIVE_FAIR_MULT,
        trend,
        resistance: trend * RESIST_MULT
      };
    };
    
    const formatPrice = p => p >= 1e6 ? '$'+(p/1e6).toFixed(2)+'M' : p >= 1e3 ? '$'+Math.round(p).toLocaleString() : '$'+p.toFixed(2);
    const formatPct = v => (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%';
    
    let currentData = null;
    let btcHistory = null;

    async function fetchBtcHistory() {
      try {
        const r = await fetch('market-history-cache.json', { cache: 'no-store' });
        if (!r.ok) return null;
        const d = await r.json();
        const rows = Array.isArray(d?.ratio_series) ? d.ratio_series : [];
        return rows.map(row => ({ date: row.date, price: Number(row.btc_usd) })).filter(r => Number.isFinite(r.price));
      } catch { return null; }
    }

    function computeMA(prices, period) {
      if (!prices || prices.length < period) return null;
      const slice = prices.slice(-period);
      return slice.reduce((sum, p) => sum + p, 0) / period;
    }
    
    const formatDateTime = value => {
      if (!value) return 'unknown time';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    };
    const marketAgeDays = observedAt => {
      const observed = observedAt ? new Date(observedAt) : null;
      if (!observed || Number.isNaN(observed.getTime())) return null;
      return Math.floor((Date.now() - observed.getTime()) / 86400000);
    };
    const marketFreshnessPill = observedAt => {
      const age = marketAgeDays(observedAt);
      const stale = age === null || age < 0 || age > 3;
      const label = age === null ? 'market date missing' : age < 0 ? 'future-dated market' : `market ${stale ? 'stale' : 'fresh'} · ${age}d`;
      return `<span class="freshness-pill ${stale ? 'stale' : 'fresh'}">${label}</span>`;
    };

    async function fetchCachedBTC() {
      const r = await fetch('market-cache.json', { cache: 'no-store' });
      if (!r.ok) throw new Error('market-cache unavailable');
      const d = await r.json();
      const asset = d.assets && d.assets.btc_usd;
      const price = Number(asset && asset.price);
      if (!Number.isFinite(price) || price <= 0) throw new Error('market-cache BTC price invalid');
      return {
        price,
        change: null,
        source: asset.source || d.source || 'market-cache',
        observedAt: asset.as_of || d.generated_at,
        cacheGenerated: d.generated_at
      };
    }

    async function fetchBTC() {
      try {
        return await fetchCachedBTC();
      } catch {}
      try {
        const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true');
        const d = await r.json();
        return {
          price: d.bitcoin.usd,
          change: d.bitcoin.usd_24h_change / 100,
          source: 'CoinGecko live',
          observedAt: new Date().toISOString(),
          cacheGenerated: null
        };
      } catch {
        const r = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
        const d = await r.json();
        return {
          price: parseFloat(d.data.amount),
          change: null,
          source: 'Coinbase live',
          observedAt: new Date().toISOString(),
          cacheGenerated: null
        };
      }
    }
    
    function getStatus(price, fair, sup, res) {
      if (price < sup) return { text: '🟢 Deeply Undervalued', cls: 'status-undervalued' };
      if (price < fair * 0.7) return { text: '🟢 Undervalued', cls: 'status-undervalued' };
      if (price < fair * 1.3) return { text: '🔵 Conservative Fair Zone', cls: 'status-fair' };
      if (price < res) return { text: '🟠 Above Conservative Fair', cls: 'status-overvalued' };
      return { text: '🔴 Overvalued', cls: 'status-overvalued' };
    }
    
    function gaugePos(price, sup, res) {
      const lp = Math.log10(price), ls = Math.log10(sup), lr = Math.log10(res);
      return Math.max(0, Math.min(100, (lp - ls) / (lr - ls) * 100));
    }
    
    function drawChart(canvas, currentPrice, isModal = false) {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      
      const W = rect.width, H = rect.height;
      const pad = isModal ? { t: 25, r: 15, b: 35, l: 55 } : { t: 15, r: 10, b: 22, l: 40 };
      const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
      
      const startD = daysSinceGenesis(new Date('2010-01-01'));
      const endD = daysSinceGenesis(new Date('2036-01-01'));
      const curD = daysSinceGenesis();
      const logMin = 0, logMax = 8;
      
      const xPos = d => pad.l + ((d - startD) / (endD - startD)) * cW;
      const yPos = p => pad.t + (1 - (Math.log10(Math.max(1, Math.min(1e8, p))) - logMin) / (logMax - logMin)) * cH;
      
      ctx.fillStyle = isModal ? '#1a1a1a' : '#1a1a1a';
      ctx.fillRect(0, 0, W, H);
      
      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      const gridPrices = isModal ? [10, 100, 1e3, 1e4, 1e5, 1e6, 1e7] : [10, 100, 1e3, 1e4, 1e5, 1e6];
      gridPrices.forEach(p => {
        ctx.beginPath(); ctx.moveTo(pad.l, yPos(p)); ctx.lineTo(W - pad.r, yPos(p)); ctx.stroke();
      });
      
      // Vertical grid (years)
      if (isModal) {
        const years = [2010, 2012, 2014, 2016, 2018, 2020, 2022, 2024, 2026, 2028, 2030, 2032, 2034, 2036];
        years.forEach(y => {
          const x = xPos(daysSinceGenesis(new Date(y + '-01-01')));
          ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, H - pad.b); ctx.stroke();
        });
      }
      
      // Fill corridor
      ctx.fillStyle = 'rgba(77,166,255,0.08)';
      ctx.beginPath();
      for (let d = startD; d <= endD; d += 30) { const x = xPos(d), y = yPos(powerLawPrice(d) * SUPPORT_MULT); d === startD ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
      for (let d = endD; d >= startD; d -= 30) { ctx.lineTo(xPos(d), yPos(powerLawPrice(d) * RESIST_MULT)); }
      ctx.closePath(); ctx.fill();
      
      // Lines
      ctx.lineWidth = isModal ? 2.5 : 2;
      [
        [SUPPORT_MULT, 'rgba(0,211,149,0.7)'],
        [CONSERVATIVE_FAIR_MULT, 'rgba(77,166,255,0.9)'],
        [TREND_MULT, 'rgba(255,255,255,0.45)'],
        [RESIST_MULT, 'rgba(255,107,107,0.7)']
      ].forEach(([m, c]) => {
        ctx.strokeStyle = c; ctx.beginPath();
        for (let d = startD; d <= endD; d += 30) { const x = xPos(d), y = yPos(powerLawPrice(d) * m); d === startD ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
        ctx.stroke();
      });
      
      // Current time line
      ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(xPos(curD), pad.t); ctx.lineTo(xPos(curD), H - pad.b); ctx.stroke();
      ctx.setLineDash([]);
      
      // Price dot
      const dotSize = isModal ? 8 : 5;
      ctx.fillStyle = '#f7931a';
      ctx.beginPath(); ctx.arc(xPos(curD), yPos(currentPrice), dotSize, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      
      // Labels
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = (isModal ? '11' : '9') + 'px -apple-system, sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      const labelPrices = isModal ? [100, 1e3, 1e4, 1e5, 1e6, 1e7] : [1e3, 1e4, 1e5, 1e6];
      labelPrices.forEach(p => {
        const label = p >= 1e6 ? '$' + (p/1e6) + 'M' : '$' + (p/1e3) + 'K';
        ctx.fillText(label, pad.l - 5, yPos(p));
      });
      
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      const yearLabels = isModal ? [2010, 2014, 2018, 2022, 2026, 2030, 2034] : [2012, 2018, 2024, 2030];
      yearLabels.forEach(y => ctx.fillText(y, xPos(daysSinceGenesis(new Date(y + '-01-01'))), H - pad.b + 6));
      
      ctx.fillStyle = '#f7931a';
      ctx.font = 'bold ' + (isModal ? '12' : '9') + 'px -apple-system, sans-serif';
      ctx.fillText('NOW', xPos(curD), H - pad.b + 6);
      
      // Future projections (modal only)
      if (isModal) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '10px -apple-system, sans-serif';
        
        // 2028 halving projection
        const d2028 = daysSinceGenesis(new Date('2028-04-01'));
        const fair2028 = powerLawPrice(d2028) * CONSERVATIVE_FAIR_MULT;
        ctx.fillText('2028 conservative: ' + formatPrice(fair2028), xPos(d2028), yPos(fair2028) - 15);
        
        // 2032 projection
        const d2032 = daysSinceGenesis(new Date('2032-01-01'));
        const fair2032 = powerLawPrice(d2032) * CONSERVATIVE_FAIR_MULT;
        ctx.fillText('2032 conservative: ' + formatPrice(fair2032), xPos(d2032), yPos(fair2032) - 15);
      }
    }
    
    function openModal() {
      if (!currentData) return;
      const modal = document.getElementById('modal');
      modal.classList.add('active');
      
      const { price, conservativeFair, trend } = currentData;
      
      // Future projections
      const d2025 = daysSinceGenesis(new Date('2025-12-31'));
      const d2028 = daysSinceGenesis(new Date('2028-04-01'));
      const d2030 = daysSinceGenesis(new Date('2030-01-01'));
      
      document.getElementById('modalInfo').innerHTML = `
        <div class="modal-stat">
          <div class="modal-stat-value" style="color: var(--btc)">${formatPrice(price)}</div>
          <div class="modal-stat-label">Current</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-value" style="color: var(--blue)">${formatPrice(conservativeFair)}</div>
          <div class="modal-stat-label">Conservative</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-value" style="color: var(--text)">${formatPrice(trend)}</div>
          <div class="modal-stat-label">Trend Anchor</div>
        </div>
        <div class="modal-stat">
          <div class="modal-stat-value" style="color: var(--blue)">${formatPrice(powerLawPrice(d2030) * CONSERVATIVE_FAIR_MULT)}</div>
          <div class="modal-stat-label">Conservative 2030</div>
        </div>
      `;
      
      setTimeout(() => {
        const canvas = document.getElementById('modalChart');
        if (canvas) drawChart(canvas, price, true);
      }, 50);
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    // Close on escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    
    async function render() {
      const app = document.getElementById('app');
      try {
        const { price, change, source, observedAt, cacheGenerated } = await fetchBTC();
        if (!btcHistory) btcHistory = await fetchBtcHistory();
        const prices = btcHistory ? btcHistory.map(r => r.price) : [];
        const ma200 = computeMA(prices, 200);
        const ma90 = computeMA(prices, 90);
        const ma50 = computeMA(prices, 50);
        const days = daysSinceGenesis();
        const { support, conservativeFair, trend, resistance } = powerLawModel(days);
        const dev = (price - conservativeFair) / conservativeFair;
        const trendDev = (price - trend) / trend;
        const status = getStatus(price, conservativeFair, support, resistance);
        
        currentData = { price, conservativeFair, trend, support, resistance, days, ma200, ma90, ma50 };
        
        const regimeSignal = ma200 ? (price > ma200 ? { text: '🟢 Above 200DMA — Bull Regime', cls: 'positive' } : { text: '🔴 Below 200DMA — Bear Regime', cls: 'negative' }) : null;
        const maDev = ma200 ? ((price - ma200) / ma200) : null;
        
        app.innerHTML = `
          <div class="card">
            <div class="price-section">
              <div class="price-label">Bitcoin Price</div>
              <div class="price">${formatPrice(price)}</div>
              ${change !== null ? `<div class="price-change ${change >= 0 ? 'positive' : 'negative'}">${formatPct(change)} (24h)</div>` : ''}
            </div>
            <div class="metrics">
              <div class="metric"><div class="metric-value power-law-value">${formatPrice(conservativeFair)}</div><div class="metric-label">Conservative Fair</div></div>
              <div class="metric"><div class="metric-value">${formatPrice(trend)}</div><div class="metric-label">Trend Anchor</div></div>
              <div class="metric"><div class="metric-value ${dev >= 0 ? 'negative' : 'positive'}">${formatPct(dev)}</div><div class="metric-label">From Conservative</div></div>
              <div class="metric"><div class="metric-value ${trendDev >= 0 ? 'negative' : 'positive'}">${formatPct(trendDev)}</div><div class="metric-label">From Anchor</div></div>
            </div>
            <div class="source-row">BTC market: ${source || 'unknown'} · observed ${formatDateTime(observedAt)} ${marketFreshnessPill(observedAt)}${cacheGenerated ? ` · market cache ${formatDateTime(cacheGenerated)}` : ''}<br>AIM/regime freshness is separate on Dashboard.</div>
          </div>
          ${regimeSignal ? `
          <div class="card">
            <div class="gauge-section">
              <div class="gauge-wrap">
                <div class="gauge-label">200DMA Regime Signal</div>
                <div class="status-badge ${regimeSignal.cls}" style="font-size:14px;margin-top:6px;">${regimeSignal.text}</div>
              </div>
            </div>
            <div class="metrics" style="margin-top:12px;">
              <div class="metric"><div class="metric-value">${ma200 ? formatPrice(ma200) : '—'}</div><div class="metric-label">200DMA</div></div>
              <div class="metric"><div class="metric-value ${maDev >= 0 ? 'negative' : 'positive'}">${maDev !== null ? formatPct(maDev) : '—'}</div><div class="metric-label">From 200DMA</div></div>
              <div class="metric"><div class="metric-value">${ma50 ? formatPrice(ma50) : '—'}</div><div class="metric-label">50DMA</div></div>
              <div class="metric"><div class="metric-value">${ma90 ? formatPrice(ma90) : '—'}</div><div class="metric-label">90DMA</div></div>
            </div>
            <div class="model-note" style="margin-top:8px;">200DMA is a BTC regime signal: above = bull accumulation, below = bear distribution. Currently ${btcHistory ? btcHistory.length : 0} days of history available${btcHistory && btcHistory.length < 200 ? ` (${200 - btcHistory.length} more needed for full 200DMA; using ${btcHistory.length}-day proxy)` : ''}.</div>
          </div>` : ''}
          <div class="card">
            <div class="gauge-section">
              <div class="gauge-wrap">
                <div class="gauge-label">Halving Cycle Position</div>
                ${(() => {
                  const halvings = [
                    { date: new Date('2012-11-28'), label: '2012' },
                    { date: new Date('2016-07-09'), label: '2016' },
                    { date: new Date('2020-05-11'), label: '2020' },
                    { date: new Date('2024-04-19'), label: '2024' },
                    { date: new Date('2028-04-19'), label: '2028 (est)' }
                  ];
                  const now = new Date();
                  let current = null, next = null;
                  for (let i = 0; i < halvings.length; i++) {
                    if (halvings[i].date <= now && (i + 1 < halvings.length)) {
                      current = halvings[i];
                      next = halvings[i + 1];
                    }
                  }
                  if (!current || !next) return '<div class="metric-value">—</div>';
                  const cycleLen = (next.date - current.date) / 864e5;
                  const elapsed = (now - current.date) / 864e5;
                  const cyclePct = (elapsed / cycleLen) * 100;
                  const phase = cyclePct < 25 ? 'Early Bull' : cyclePct < 50 ? 'Mid Bull' : cyclePct < 75 ? 'Late Bull / Distribution' : 'Bear Accumulation';
                  const phaseColor = cyclePct < 50 ? 'var(--green)' : cyclePct < 75 ? 'var(--amber)' : 'var(--red)';
                  return `
                    <div class="status-badge" style="font-size:14px;margin-top:6px;color:${phaseColor};">${phase}</div>
                    <div class="metrics" style="margin-top:12px;">
                      <div class="metric"><div class="metric-value">${current.label}</div><div class="metric-label">Last Halving</div></div>
                      <div class="metric"><div class="metric-value">${cyclePct.toFixed(0)}%</div><div class="metric-label">Cycle Progress</div></div>
                      <div class="metric"><div class="metric-value">${next.label}</div><div class="metric-label">Next Halving</div></div>
                      <div class="metric"><div class="metric-value">${Math.round((next.date - now) / 864e5)}d</div><div class="metric-label">Days to Next</div></div>
                    </div>
                    <div style="background:rgba(255,255,255,0.08);border-radius:8px;height:12px;overflow:hidden;margin-top:8px;">
                      <div style="height:100%;width:${Math.min(100, cyclePct).toFixed(0)}%;background:linear-gradient(90deg,var(--green),var(--amber),var(--red));border-radius:8px;"></div>
                    </div>
                    <div class="model-note" style="margin-top:6px;">Historically: first 12-18 months post-halving = accumulation. 18-36 months = bull run. Final 12 months = distribution before next halving cycle reset.</div>
                  `;
                })()}
              </div>
            </div>
          </div>
          <div class="card chart-card" onclick="openModal()">
            <div class="tap-hint">Tap to expand</div>
            <div class="chart-title">Power Law Corridor (2012–2034)</div>
            <div class="chart-container"><canvas id="chart"></canvas></div>
            <div class="chart-legend">
              <div class="legend-item"><span class="legend-dot" style="background:#00d395"></span>Support</div>
              <div class="legend-item"><span class="legend-dot" style="background:#4da6ff"></span>Conservative</div>
              <div class="legend-item"><span class="legend-dot" style="background:rgba(255,255,255,0.45)"></span>Anchor</div>
              <div class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span>Resist</div>
              <div class="legend-item"><span class="legend-dot" style="background:#f7931a"></span>Now</div>
            </div>
          </div>
          <div class="card">
            <div class="gauge-section">
              <div class="gauge-wrap">
                <div class="gauge-label">Position in Channel</div>
                <div class="gauge"><div class="gauge-marker" style="left:${gaugePos(price, support, resistance)}%"></div></div>
                <div class="gauge-labels"><span>Support</span><span>Conservative</span><span>Resist</span></div>
              </div>
              <div class="status-badge ${status.cls}">${status.text}</div>
            </div>
            <div class="bands">
              <div class="band support"><div class="band-value">${formatPrice(support)}</div><div class="band-label">Support</div></div>
              <div class="band fair"><div class="band-value">${formatPrice(conservativeFair)}</div><div class="band-label">Conservative</div></div>
              <div class="band"><div class="band-value">${formatPrice(trend)}</div><div class="band-label">Trend Anchor</div></div>
              <div class="band resist"><div class="band-value">${formatPrice(resistance)}</div><div class="band-label">Resistance</div></div>
            </div>
            <div class="model-note"><strong>Model note:</strong> AIM scoring uses the raw trend anchor. This page also shows the conservative visual fair line at 0.71× the anchor, which is why older views could show a different fair-price range.</div>
          </div>`;
        
        const canvas = document.getElementById('chart');
        if (canvas) drawChart(canvas, price, false);
        document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      } catch (e) {
        app.innerHTML = `<div class="error">Failed to load. <a href="#" onclick="location.reload()">Retry</a></div>`;
      }
    }
    
    render();
    setInterval(render, 60000);
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') render(); });
  </script>
</body>
</html>
