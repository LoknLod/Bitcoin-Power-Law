<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BTC/AIM Dashboard">
  <meta name="theme-color" content="#0d0d0d">
  <title>BTC/AIM Dashboard</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --panel: rgba(255,255,255,0.04);
      --border: #2a2a2a;
      --text: #ffffff;
      --text-dim: #888888;
      --btc: #f7931a;
      --gold: #ffd700;
      --green: #00d395;
      --red: #ff6b6b;
      --blue: #4da6ff;
      --amber: #ffab40;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: radial-gradient(circle at top, rgba(247,147,26,0.12), transparent 32%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
      padding: 12px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--btc), var(--blue));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 { font-size: 20px; font-weight: 650; }
    .subtitle { font-size: 11px; color: var(--text-dim); line-height: 1.35; }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    .nav-links a.active {
      color: var(--btc);
      background: rgba(247,147,26,0.15);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 10px;
    }

    .warning {
      display: none;
      background: rgba(255,171,64,0.14);
      border-color: rgba(255,171,64,0.35);
      color: var(--amber);
      font-size: 12px;
      line-height: 1.4;
    }

    .warning.show { display: block; }

    .posture-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .posture-label {
      font-size: 32px;
      font-weight: 750;
      color: var(--btc);
      line-height: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 5px 9px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
      font-size: 11px;
      white-space: nowrap;
      text-transform: capitalize;
    }

    .badge.demo { color: var(--amber); background: rgba(255,171,64,0.14); }
    .badge.stale { color: var(--red); background: rgba(255,107,107,0.14); }
    .badge.local-cache { color: var(--green); background: rgba(0,211,149,0.12); }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin: 10px 0;
    }

    .meta-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--text-dim);
      font-size: 11px;
    }

    .meta-item strong {
      color: var(--text);
      font-weight: 500;
      text-align: right;
    }

    .explanation {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .thesis-line {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .score-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .score-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .score-name {
      font-size: 13px;
      font-weight: 650;
      margin-bottom: 4px;
    }

    .confidence {
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-number {
      font-size: 30px;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
      line-height: 0.9;
    }

    .score-track {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 9px;
    }

    .score-fill {
      height: 100%;
      border-radius: 8px;
      width: 0;
      transition: width 500ms ease;
    }

    .score-fill.ai-productivity { background: linear-gradient(90deg, var(--blue), var(--green)); }
    .score-fill.ai-bubble-risk { background: linear-gradient(90deg, var(--amber), var(--red)); }
    .score-fill.monetary-reset { background: linear-gradient(90deg, var(--gold), var(--btc)); }
    .score-fill.energy-bottleneck { background: linear-gradient(90deg, var(--blue), var(--amber)); }
    .score-fill.hard-money-repricing { background: linear-gradient(90deg, var(--btc), var(--gold)); }

    .interpretation {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.4;
    }

    .allocation-list {
      display: grid;
      gap: 10px;
    }

    .allocation-item {
      background: var(--panel);
      border-radius: 10px;
      padding: 10px;
    }

    .allocation-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .allocation-name {
      font-size: 13px;
      font-weight: 650;
    }

    .allocation-pct {
      color: var(--btc);
      font-size: 18px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .allocation-bar {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 7px;
    }

    .allocation-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--btc), var(--gold));
      border-radius: 6px;
    }

    .allocation-role {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.35;
    }

    .signal-list {
      display: grid;
      gap: 8px;
    }

    .signal-item {
      background: var(--panel);
      border-radius: 10px;
      padding: 10px;
      border-left: 3px solid var(--btc);
    }

    .signal-item.ai-productivity { border-left-color: var(--blue); }
    .signal-item.ai-bubble-risk { border-left-color: var(--red); }
    .signal-item.monetary-reset { border-left-color: var(--gold); }
    .signal-item.energy-bottleneck { border-left-color: var(--amber); }
    .signal-item.hard-money-repricing { border-left-color: var(--btc); }

    .signal-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
    }

    .signal-name {
      font-size: 13px;
      font-weight: 650;
      line-height: 1.25;
    }

    .signal-score {
      font-size: 18px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .signal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 7px;
    }

    .tag {
      color: var(--text-dim);
      background: rgba(255,255,255,0.06);
      border-radius: 9px;
      padding: 3px 7px;
      font-size: 10px;
      line-height: 1.2;
    }

    .signal-note {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.35;
    }

    .empty-state {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.4;
      padding: 10px;
      background: var(--panel);
      border-radius: 10px;
    }

    .debate-question {
      font-size: 18px;
      font-weight: 650;
      line-height: 1.25;
    }

    .rule-card {
      border-color: rgba(247,147,26,0.35);
      background: rgba(247,147,26,0.08);
      color: var(--text);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 0;
    }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--text-dim);
    }

    @media (min-width: 560px) {
      .score-grid {
        grid-template-columns: 1fr 1fr;
      }

      .meta-grid {
        grid-template-columns: 1fr 1fr;
      }

      .meta-item {
        display: block;
      }

      .meta-item strong {
        display: block;
        text-align: left;
        margin-top: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">₿</div>
      <div>
        <h1>BTC/AIM Dashboard</h1>
        <div class="subtitle">BTC signal, AIM posture, and macro regime — no six-tab circus.</div>
      </div>
    </header>

        <div class="nav-links">
      <a href="index.html" class="active">Dashboard</a>
      <a href="power-law.html">Power Law</a>
      <a href="macro.html">Macro</a>
    </div>

    <div id="demoWarning" class="card warning">Embedded demo only: aim-cache.json could not be loaded. Run scripts/score_aim_macro.py --as-of YYYY-MM-DD for the canonical cache.</div>
    <main id="app"><div class="loading">Loading AIM cache...</div></main>
  </div>

  <script>
    const SAMPLE_DATA = {
      schema_version: "aim_macro_cache.v0.1",
      scoring_version: "aim_macro_scoring.v0.1",
      generated_at: null,
      source: "embedded_demo_only",
      freshness: "demo",
      posture: {
        key: "demo",
        label: "Demo",
        explanation: "Embedded fallback only. It is not model output and is not a scored macro cache."
      },
      scores: {
        ai_productivity: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." },
        ai_bubble_risk: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." },
        monetary_reset: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." },
        energy_bottleneck: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." },
        hard_money_repricing: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." }
      },
      aim5_allocation: [
        { sleeve: "AI Productive Equity", target_pct: 40, role: "Own profitable AI platforms and infrastructure." },
        { sleeve: "Hard Money / Monetary Reset Hedge", target_pct: 25, role: "BTC spear, gold shield." },
        { sleeve: "Energy / Power / Real Assets", target_pct: 15, role: "Own physical bottlenecks behind AI and hard money." },
        { sleeve: "Runway / Optionality", target_pct: 15, role: "Dry powder and forced-selling protection." },
        { sleeve: "Spec AIM Venture Basket", target_pct: 5, role: "Small sandbox for asymmetric moonshots." }
      ],
      signals: [
        {
          name: "Embedded Demo Placeholder",
          regime: "demo",
          score: 50,
          weight: 0,
          direction: "not scored",
          source: "embedded_demo_only",
          as_of: "n/a",
          note: "This fallback prevents a blank page only; scripts/score_aim_macro.py is the canonical generator.",
          freshness: "demo"
        }
      ],
      debate_question: "Is AI producing real productivity faster than credit/fiscal stress is degrading money?"
    };

    const SCORE_LABELS = {
      ai_productivity: "AI Productivity",
      ai_bubble_risk: "AI Bubble Risk",
      monetary_reset: "Monetary Reset Risk",
      energy_bottleneck: "Energy Bottleneck",
      hard_money_repricing: "Hard Money Repricing"
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function clampScore(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return 0;
      return Math.max(0, Math.min(100, Math.round(number)));
    }

    function slug(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function formatDate(value) {
      if (!value) return "Unknown";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}-${String(date.getUTCDate()).padStart(2, "0")} ${String(date.getUTCHours()).padStart(2, "0")}:${String(date.getUTCMinutes()).padStart(2, "0")} UTC`;
    }

    function titleize(value) {
      return String(value || "unknown").replace(/_/g, " ");
    }

    function freshnessClass(value) {
      return slug(value).replace("local-cache", "local-cache");
    }

    async function loadCache() {
      try {
        const response = await fetch("aim-cache.json", { cache: "no-store" });
        if (!response.ok) throw new Error("Cache request failed");
        const data = await response.json();
        if (!data || !data.scores || !data.posture) throw new Error("Cache shape invalid");
        return { data, usedDemo: false };
      } catch (error) {
        console.warn("AIM cache fallback:", error);
        return { data: SAMPLE_DATA, usedDemo: true };
      }
    }

    function renderPosture(data) {
      const freshness = data.freshness || "unknown";
      return `
        <section class="card">
          <div class="card-title">Dashboard Posture</div>
          <div class="posture-row">
            <div class="posture-label">${escapeHtml(data.posture?.label || "Unknown")}</div>
            <span class="badge ${freshnessClass(freshness)}">${escapeHtml(titleize(freshness))}</span>
          </div>
          <div class="meta-grid">
            <div class="meta-item"><span>Generated</span><strong>${escapeHtml(formatDate(data.generated_at))}</strong></div>
            <div class="meta-item"><span>Source</span><strong>${escapeHtml(titleize(data.source || "unknown"))}</strong></div>
            <div class="meta-item"><span>Scoring</span><strong>${escapeHtml(data.scoring_version || data.model_version || "unknown")}</strong></div>
          </div>
          <p class="explanation">${escapeHtml(data.posture?.explanation || "")}</p>
          <p class="thesis-line">BTC is the spear. Gold is the shield. AIM stays barbelled unless the signal ledger earns a tilt.</p>
        </section>
      `;
    }

    function renderScores(scores) {
      return `
        <div class="score-grid">
          ${Object.entries(SCORE_LABELS).map(([key, label]) => {
            const item = scores?.[key] || {};
            const score = clampScore(item.score);
            return `
              <section class="score-card">
                <div class="score-top">
                  <div>
                    <div class="score-name">${escapeHtml(label)}</div>
                    <div class="confidence">${escapeHtml(item.confidence || "unknown")} confidence</div>
                  </div>
                  <div class="score-number">${score}</div>
                </div>
                <div class="score-track">
                  <div class="score-fill ${key.replace(/_/g, "-")}" style="width: ${score}%"></div>
                </div>
                <div class="interpretation">${escapeHtml(item.interpretation || "No interpretation available.")}</div>
              </section>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderAllocation(items) {
      const allocation = Array.isArray(items) ? items : SAMPLE_DATA.aim5_allocation;
      return `
        <section class="card">
          <div class="card-title">AIM-5 Allocation Frame</div>
          <div class="allocation-list">
            ${allocation.map(item => {
              const pct = clampScore(item.target_pct);
              return `
                <div class="allocation-item">
                  <div class="allocation-head">
                    <div class="allocation-name">${escapeHtml(item.sleeve)}</div>
                    <div class="allocation-pct">${pct}%</div>
                  </div>
                  <div class="allocation-bar">
                    <div class="allocation-fill" style="width: ${pct}%"></div>
                  </div>
                  <div class="allocation-role">${escapeHtml(item.role)}</div>
                </div>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderSignals(signals) {
      const items = Array.isArray(signals) ? signals : [];
      return `
        <section class="card">
          <div class="card-title">Signal Watchlist</div>
          <div class="signal-list">
            ${items.length ? items.map(signal => {
              const regimeSlug = slug(signal.regime).replace("monetary-reset-risk", "monetary-reset");
              const score = clampScore(signal.score);
              return `
                <article class="signal-item ${regimeSlug}">
                  <div class="signal-head">
                    <div class="signal-name">${escapeHtml(signal.name)}</div>
                    <div class="signal-score">${score}</div>
                  </div>
                  <div class="signal-tags">
                    <span class="tag">${escapeHtml(titleize(signal.regime))}</span>
                    <span class="tag">Weight ${escapeHtml(signal.weight ?? "n/a")}</span>
                    <span class="tag">${escapeHtml(signal.direction || "direction n/a")}</span>
                    ${signal.value_label ? `<span class="tag">${escapeHtml(signal.value_label)}</span>` : ""}
                    <span class="tag">${escapeHtml(signal.source || "source n/a")}</span>
                    <span class="tag">${escapeHtml(signal.as_of || "as_of n/a")}</span>
                    ${signal.freshness ? `<span class="tag">${escapeHtml(titleize(signal.freshness))}</span>` : ""}
                    ${Number.isFinite(Number(signal.age_days)) ? `<span class="tag">${escapeHtml(Number(signal.age_days))}d old</span>` : ""}
                  </div>
                  <div class="signal-note">${escapeHtml(signal.note || "")}</div>
                </article>
              `;
            }).join("") : `<div class="empty-state">No source signals yet. Run scripts/score_aim_macro.py to generate the local starter ledger.</div>`}
          </div>
        </section>
      `;
    }

    function renderDebate(question) {
      return `
        <section class="card">
          <div class="card-title">Debate Question</div>
          <div class="debate-question">${escapeHtml(question || SAMPLE_DATA.debate_question)}</div>
        </section>
      `;
    }

    function renderRule() {
      return `
        <footer class="card rule-card">
          Decision support only. No trades, reallocations, or broker/account actions without explicit Doug approval.
        </footer>
      `;
    }

    async function init() {
      const { data, usedDemo } = await loadCache();
      document.getElementById("demoWarning").classList.toggle("show", usedDemo);
      document.getElementById("app").innerHTML = [
        renderPosture(data),
        renderScores(data.scores),
        renderAllocation(data.aim5_allocation),
        renderSignals(data.dashboard_signals || data.signals),
        renderDebate(data.debate_question),
        renderRule()
      ].join("");
    }

    init();
  </script>
</body>
</html>
