<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BTC/AIM Dashboard">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="icon" href="data:,">
  <title>BTC/AIM Dashboard</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --card: #1a1a1a;
      --panel: rgba(255,255,255,0.04);
      --border: #2a2a2a;
      --text: #ffffff;
      --text-dim: #888888;
      --btc: #f7931a;
      --gold: #ffd700;
      --green: #00d395;
      --red: #ff6b6b;
      --blue: #4da6ff;
      --amber: #ffab40;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: radial-gradient(circle at top, rgba(247,147,26,0.12), transparent 32%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
      padding: 12px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--btc), var(--blue));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1 { font-size: 20px; font-weight: 650; }
    .subtitle { font-size: 11px; color: var(--text-dim); line-height: 1.35; }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
    }

    .nav-links a.active {
      color: var(--btc);
      background: rgba(247,147,26,0.15);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 10px;
    }

    .warning {
      display: none;
      background: rgba(255,171,64,0.14);
      border-color: rgba(255,171,64,0.35);
      color: var(--amber);
      font-size: 12px;
      line-height: 1.4;
    }

    .warning.show { display: block; }

    .posture-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .posture-label {
      font-size: 32px;
      font-weight: 750;
      color: var(--btc);
      line-height: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 5px 9px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
      font-size: 11px;
      white-space: nowrap;
      text-transform: capitalize;
    }

    .badge.demo { color: var(--amber); background: rgba(255,171,64,0.14); }
    .badge.stale, .badge.missing, .badge.future { color: var(--red); background: rgba(255,107,107,0.14); }
    .badge.local-cache { color: var(--green); background: rgba(0,211,149,0.12); }
    .freshness-strip {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 8px 0 2px;
    }
    .freshness-chip {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      min-height: 22px;
      padding: 4px 7px;
      border-radius: 9px;
      background: rgba(255,255,255,0.05);
      color: var(--text-dim);
      font-size: 10px;
      line-height: 1.2;
    }
    .freshness-chip strong { color: var(--text); font-weight: 650; }
    .freshness-chip.stale strong, .freshness-chip.missing strong, .freshness-chip.future strong { color: var(--red); }
    .freshness-chip.local-cache strong { color: var(--green); }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin: 10px 0;
    }

    .meta-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--text-dim);
      font-size: 11px;
    }

    .meta-item strong {
      color: var(--text);
      font-weight: 500;
      text-align: right;
    }

    .explanation {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .thesis-line {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .score-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .score-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .score-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .score-name {
      font-size: 13px;
      font-weight: 650;
      margin-bottom: 4px;
    }

    .confidence {
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .score-number {
      font-size: 30px;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
      line-height: 0.9;
    }

    .score-track {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 9px;
    }

    .score-fill {
      height: 100%;
      border-radius: 8px;
      width: 0;
      transition: width 500ms ease;
    }

    .score-fill.ai-productivity { background: linear-gradient(90deg, var(--blue), var(--green)); }
    .score-fill.ai-bubble-risk { background: linear-gradient(90deg, var(--amber), var(--red)); }
    .score-fill.monetary-reset { background: linear-gradient(90deg, var(--gold), var(--btc)); }
    .score-fill.energy-bottleneck { background: linear-gradient(90deg, var(--blue), var(--amber)); }
    .score-fill.hard-money-repricing { background: linear-gradient(90deg, var(--btc), var(--gold)); }

    .interpretation {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.4;
    }

    .score-impact {
      margin-top: 8px;
      padding: 7px 8px;
      border-radius: 9px;
      background: rgba(255,171,64,0.10);
      color: var(--amber);
      font-size: 11px;
      line-height: 1.35;
    }

    .provenance-line {
      color: var(--text-dim);
      font-size: 10px;
      line-height: 1.35;
      margin-top: 6px;
    }

    .allocation-list {
      display: grid;
      gap: 10px;
    }

    .allocation-item {
      background: var(--panel);
      border-radius: 10px;
      padding: 10px;
    }

    .allocation-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .allocation-name {
      font-size: 13px;
      font-weight: 650;
    }

    .allocation-pct {
      color: var(--btc);
      font-size: 18px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .allocation-bar {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 7px;
    }

    .allocation-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--btc), var(--gold));
      border-radius: 6px;
    }

    .allocation-role {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.35;
    }

    .allocation-actual {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .allocation-actual-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 5px;
      color: var(--text-dim);
      font-size: 11px;
    }

    .allocation-actual-pct {
      color: var(--blue);
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .allocation-actual-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--btc));
      border-radius: 6px;
    }

    .signal-list {
      display: grid;
      gap: 8px;
    }

    .signal-item {
      background: var(--panel);
      border-radius: 10px;
      padding: 10px;
      border-left: 3px solid var(--btc);
    }

    .signal-item.ai-productivity { border-left-color: var(--blue); }
    .signal-item.ai-bubble-risk { border-left-color: var(--red); }
    .signal-item.monetary-reset { border-left-color: var(--gold); }
    .signal-item.energy-bottleneck { border-left-color: var(--amber); }
    .signal-item.hard-money-repricing { border-left-color: var(--btc); }

    .signal-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 7px;
    }

    .signal-name {
      font-size: 13px;
      font-weight: 650;
      line-height: 1.25;
    }

    .signal-score {
      font-size: 18px;
      font-weight: 750;
      font-variant-numeric: tabular-nums;
    }

    .signal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 7px;
    }

    .tag {
      color: var(--text-dim);
      background: rgba(255,255,255,0.06);
      border-radius: 9px;
      padding: 3px 7px;
      font-size: 10px;
      line-height: 1.2;
    }

    .signal-note {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.35;
    }

    .empty-state {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.4;
      padding: 10px;
      background: var(--panel);
      border-radius: 10px;
    }

    .debate-question {
      font-size: 18px;
      font-weight: 650;
      line-height: 1.25;
    }

    .cockpit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .cockpit-metric {
      background: var(--panel);
      border-radius: 10px;
      padding: 10px;
      min-height: 72px;
    }

    .cockpit-metric span {
      display: block;
      color: var(--text-dim);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .cockpit-metric strong {
      display: block;
      color: var(--text);
      font-size: 18px;
      font-weight: 750;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .cockpit-read {
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .rule-card {
      border-color: rgba(247,147,26,0.35);
      background: rgba(247,147,26,0.08);
      color: var(--text);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 0;
    }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--text-dim);
    }

    @media (min-width: 560px) {
      .score-grid {
        grid-template-columns: 1fr 1fr;
      }

      .meta-grid {
        grid-template-columns: 1fr 1fr;
      }

      .meta-item {
        display: block;
      }

      .meta-item strong {
        display: block;
        text-align: left;
        margin-top: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">₿</div>
      <div>
        <h1>BTC/AIM Dashboard</h1>
        <div class="subtitle">BTC signal, AIM posture, and macro regime — no six-tab circus.</div>
      </div>
    </header>

        <div class="nav-links">
      <a href="index.html" class="active">Dashboard</a>
      <a href="power-law.html">Power Law</a>
      <a href="macro.html">Macro</a>
    </div>

    <div id="demoWarning" class="card warning">Embedded demo only: aim-cache.json could not be loaded. Run scripts/score_aim_macro.py --as-of YYYY-MM-DD for the canonical cache.</div>
    <main id="app"><div class="loading">Loading AIM cache...</div></main>
  </div>

  <script>
    const SAMPLE_DATA = {
      schema_version: "aim_macro_cache.v0.1",
      scoring_version: "aim_macro_scoring.v0.1",
      generated_at: null,
      source: "embedded_demo_only",
      freshness: "demo",
      freshness_detail: {
        aim_cache: "demo",
        market_inputs: "demo",
        monetary_regime: "demo",
        thresholds: { market_max_age_days: 3, fred_directional_warning_days: 90 },
        score_inputs: {
          monetary_reset: { freshness: "demo", affected_by_stale_inputs: false, stale_inputs: [] },
          hard_money_repricing: { freshness: "demo", affected_by_stale_inputs: false, stale_inputs: [] }
        }
      },
      posture: {
        key: "demo",
        label: "Demo",
        explanation: "Embedded fallback only. It is not model output and is not a scored macro cache."
      },
      scores: {
        ai_productivity: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." },
        ai_bubble_risk: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." },
        monetary_reset: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." },
        energy_bottleneck: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." },
        hard_money_repricing: { score: 50, confidence: "demo", interpretation: "Embedded demo placeholder; generate aim-cache.json for scored data." }
      },
      aim5_allocation: [
        { sleeve: "AI Productive Equity", target_pct: 46, role: "Semiconductors, AI platform, and test infrastructure bottlenecks." },
        { sleeve: "Agent Toll Collectors", target_pct: 11, role: "Toll collectors every agent needs: payments, trust, proprietary data." },
        { sleeve: "Energy / Power / Real Assets", target_pct: 9.5, role: "Power generation and grid bottleneck behind AI electrification." },
        { sleeve: "Hard Money / Monetary Reset Hedge", target_pct: 7.5, role: "Gold hedge. BTC lives outside per v0.4 doctrine." },
        { sleeve: "Healthcare / Defense", target_pct: 13, role: "Secular growth and geopolitical hedge." },
        { sleeve: "Critical Minerals", target_pct: 6, role: "Rare-earth optionality for electrification and semiconductor supply." },
        { sleeve: "Runway / Dry Powder", target_pct: 7, role: "T-bills for drawdown ammunition and deployment triggers." }
      ],
      signals: [
        {
          name: "Embedded Demo Placeholder",
          regime: "demo",
          score: 50,
          weight: 0,
          direction: "not scored",
          source: "embedded_demo_only",
          as_of: "n/a",
          note: "This fallback prevents a blank page only; scripts/score_aim_macro.py is the canonical generator.",
          freshness: "demo"
        }
      ],
      debate_question: "Is AI producing real productivity faster than credit/fiscal stress is degrading money?"
    };

    const SCORE_LABELS = {
      ai_productivity: "AI Productivity",
      ai_bubble_risk: "AI Bubble Risk",
      monetary_reset: "Monetary Reset Risk",
      energy_bottleneck: "Energy Bottleneck",
      hard_money_repricing: "Hard Money Repricing"
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function clampScore(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return 0;
      return Math.max(0, Math.min(100, Math.round(number)));
    }

    function slug(value) {
      return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
    }

    function formatDate(value) {
      if (!value) return "Unknown";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, "0")}-${String(date.getUTCDate()).padStart(2, "0")} ${String(date.getUTCHours()).padStart(2, "0")}:${String(date.getUTCMinutes()).padStart(2, "0")} UTC`;
    }

    function titleize(value) {
      return String(value || "unknown").replace(/_/g, " ");
    }

    function freshnessClass(value) {
      return slug(value).replace("local-cache", "local-cache");
    }

    function freshnessLabel(value) {
      const raw = String(value || "unknown");
      if (raw === "local_cache") return "fresh";
      if (raw === "demo") return "demo";
      return titleize(raw);
    }

    function freshnessChip(label, value) {
      const state = value || "unknown";
      return `<span class="freshness-chip ${freshnessClass(state)}">${escapeHtml(label)} <strong>${escapeHtml(freshnessLabel(state))}</strong></span>`;
    }

    function describeAge(issue) {
      const age = Number(issue?.age_days);
      if (Number.isFinite(age)) return `${Math.max(0, Math.round(age))}d`;
      if (issue?.freshness === "missing") return "missing";
      if (issue?.freshness === "future") return "future";
      return "age unknown";
    }

    function staleIssueSummary(issues, limit = 2) {
      const list = Array.isArray(issues) ? issues : [];
      if (!list.length) return "";
      const shown = list.slice(0, limit).map(issue => `${issue.name || "Signal"} ${describeAge(issue)}`);
      const extra = list.length > limit ? ` +${list.length - limit} more` : "";
      return `${shown.join("; ")}${extra}`;
    }

    function scoreFreshnessDetail(data, key) {
      return data?.freshness_detail?.score_inputs?.[key] || {};
    }

    async function loadCache() {
      try {
        const response = await fetch("aim-cache.json", { cache: "no-store" });
        if (!response.ok) throw new Error("Cache request failed");
        const data = await response.json();
        if (!data || !data.scores || !data.posture) throw new Error("Cache shape invalid");
        return { data, usedDemo: false };
      } catch (error) {
        console.warn("AIM cache fallback:", error);
        return { data: SAMPLE_DATA, usedDemo: true };
      }
    }

    async function loadPortfolioOverlay() {
      const PORTFOLIO_CACHE_FILE = "portfolio-cockpit-cache.json";
      try {
        const response = await fetch(PORTFOLIO_CACHE_FILE, { cache: "no-store" });
        if (!response.ok) throw new Error("Portfolio overlay unavailable");
        const data = await response.json();
        if (
          !data ||
          data.schema_version !== "shrike_portfolio_cockpit.v0.1" ||
          data.mutation_allowed !== false ||
          data.source !== "kubera_schwab_plus_aim_cache" ||
          data.portfolio?.scope !== "schwab_employer_sponsored_visible_accounts_only" ||
          !data.privacy_note ||
          !Number.isFinite(Number(data.portfolio?.schwab_total))
        ) {
          throw new Error("Portfolio overlay shape invalid");
        }
        return data;
      } catch (error) {
        console.warn("Portfolio cockpit overlay suppressed:", error);
        return null;
      }
    }

    function renderPosture(data) {
      const aimFreshness = data?.freshness_detail?.aim_cache || data.freshness || "unknown";
      const marketFreshness = data?.freshness_detail?.market_inputs || "unknown";
      const monetaryFreshness = data?.freshness_detail?.monetary_regime || "unknown";
      const thresholds = data?.freshness_detail?.thresholds || {};
      return `
        <section class="card">
          <div class="card-title">Dashboard Posture</div>
          <div class="posture-row">
            <div class="posture-label">${escapeHtml(data.posture?.label || "Unknown")}</div>
            <span class="badge ${freshnessClass(aimFreshness)}">Regime ${escapeHtml(freshnessLabel(aimFreshness))}</span>
          </div>
          <div class="freshness-strip" aria-label="Freshness by source">
            ${freshnessChip("AIM", aimFreshness)}
            ${freshnessChip("BTC/gold market", marketFreshness)}
            ${freshnessChip("Macro/FRED", monetaryFreshness)}
          </div>
          <div class="meta-grid">
            <div class="meta-item"><span>Generated</span><strong>${escapeHtml(formatDate(data.generated_at))}</strong></div>
            <div class="meta-item"><span>Source</span><strong>${escapeHtml(titleize(data.source || "unknown"))}</strong></div>
            <div class="meta-item"><span>Scoring</span><strong>${escapeHtml(data.scoring_version || data.model_version || "unknown")}</strong></div>
            <div class="meta-item"><span>Freshness rules</span><strong>Market ≤${escapeHtml(thresholds.market_max_age_days ?? 3)}d · FRED warn &gt;${escapeHtml(thresholds.fred_directional_warning_days ?? 90)}d</strong></div>
          </div>
          <p class="explanation">${escapeHtml(data.posture?.explanation || "")}</p>
          <p class="thesis-line">Freshness labels describe inputs, not advice. BTC spot/proxy prices can be fresh while slower FRED regime inputs are stale or directional.</p>
        </section>
      `;
    }

    function renderRetirementCockpit(portfolio) {
      if (!portfolio) {
        return `
          <section class="card">
            <div class="card-title">Retirement Cockpit</div>
            <div class="empty-state">Private portfolio overlay unavailable. Run scripts/build_portfolio_cockpit_cache.py locally to show Schwab Retirement, BTC Stack, 2030, and 2035 readiness. Personal Kubera values stay out of the public cache.</div>
          </section>
        `;
      }
      const schwabTotal = portfolio.portfolio?.schwab_total_display || "Unavailable";
      const btcHeld = portfolio.btc?.held ?? "--";
      const btcGap = portfolio.btc?.target_gap ?? "--";
      const targetGap = portfolio.retirement?.schwab_gap_to_target;
      const gapText = Number.isFinite(Number(targetGap)) ? `$${Number(targetGap).toLocaleString(undefined, { maximumFractionDigits: 0 })}` : "Unavailable";
      const early = portfolio.retirement?.early_2030_readiness || "unknown";
      const baseline = portfolio.retirement?.faa_2035_readiness || "unknown";
      const growth2030 = portfolio.retirement?.required_annual_growth_to_2030 ?? "--";
      const btcProvenance = portfolio.btc?.provenance || "unknown";
      return `
        <section class="card">
          <div class="card-title">Retirement Cockpit</div>
          <div class="cockpit-grid">
            <div class="cockpit-metric"><span>Schwab Retirement</span><strong>${escapeHtml(schwabTotal)}</strong></div>
            <div class="cockpit-metric"><span>BTC Stack</span><strong>${escapeHtml(btcHeld)} BTC</strong></div>
            <div class="cockpit-metric"><span>BTC Target Gap</span><strong>${escapeHtml(btcGap)} BTC</strong></div>
            <div class="cockpit-metric"><span>$4M Target Gap</span><strong>${escapeHtml(gapText)}</strong></div>
            <div class="cockpit-metric"><span>2030 Optionality</span><strong>${escapeHtml(early)}</strong></div>
            <div class="cockpit-metric"><span>2035 Baseline</span><strong>${escapeHtml(baseline)}</strong></div>
            <div class="cockpit-metric"><span>2030 Required Growth</span><strong>${escapeHtml(growth2030)}%/yr</strong></div>
            <div class="cockpit-metric"><span>BTC Provenance</span><strong>${escapeHtml(btcProvenance)}</strong></div>
          </div>
          <p class="cockpit-read">${escapeHtml(portfolio.shrike_read || "Actual portfolio overlay loaded. Decision support only.")}</p>
        </section>
      `;
    }

    function renderScores(data) {
      const scores = data?.scores || {};
      return `
        <div class="score-grid">
          ${Object.entries(SCORE_LABELS).map(([key, label]) => {
            const item = scores?.[key] || {};
            const score = clampScore(item.score);
            const detail = scoreFreshnessDetail(data, key);
            const issueSummary = staleIssueSummary(detail.stale_inputs);
            return `
              <section class="score-card">
                <div class="score-top">
                  <div>
                    <div class="score-name">${escapeHtml(label)}</div>
                    <div class="confidence">${escapeHtml(item.confidence || "unknown")} confidence · ${escapeHtml(freshnessLabel(detail.freshness || data?.freshness_detail?.aim_cache || "unknown"))}</div>
                  </div>
                  <div class="score-number">${score}</div>
                </div>
                <div class="score-track">
                  <div class="score-fill ${key.replace(/_/g, "-")}" style="width: ${score}%"></div>
                </div>
                <div class="interpretation">${escapeHtml(item.interpretation || "No interpretation available.")}</div>
                ${issueSummary ? `<div class="score-impact">Directional: stale weighted input(s) affect this score — ${escapeHtml(issueSummary)}.</div>` : ""}
              </section>
            `;
          }).join("")}
        </div>
      `;
    }

    function sleeveKey(label) {
      const normalized = String(label || "").toLowerCase();
      if (normalized.includes("ai productive")) return "ai_productive_equity";
      if (normalized.includes("agent toll")) return "agent_toll_collectors";
      if (normalized.includes("hard money")) return "hard_money";
      if (normalized.includes("energy") || normalized.includes("power")) return "energy_power_real_assets";
      if (normalized.includes("healthcare") || normalized.includes("defense")) return "healthcare_defense";
      if (normalized.includes("critical minerals")) return "critical_minerals";
      if (normalized.includes("spec") || normalized.includes("test bottleneck")) return "spec_aim_venture";
      if (normalized.includes("runway") || normalized.includes("dry powder")) return "runway_optionality";
      return slug(label).replaceAll("-", "_");
    }

    function actualAllocationMap(portfolioOverlay) {
      const actual = portfolioOverlay?.aim?.actual_allocation;
      if (!actual?.available || !Array.isArray(actual.sleeves)) return new Map();
      return new Map(actual.sleeves.map(item => [item.sleeve_key, item]));
    }

    function renderActualAllocation(actual) {
      const pct = clampScore(actual.actual_pct);
      return `
        <div class="allocation-actual">
          <div class="allocation-actual-head">
            <span>Actual</span>
            <span class="allocation-actual-pct">${pct}%</span>
          </div>
          <div class="allocation-bar"><div class="allocation-actual-fill" style="width: ${pct}%"></div></div>
        </div>
      `;
    }

    function renderAllocation(items, portfolioOverlay) {
      const allocation = Array.isArray(items) ? items : SAMPLE_DATA.aim5_allocation;
      const actualBySleeve = actualAllocationMap(portfolioOverlay);
      const unclassified = actualBySleeve.get("unclassified");
      return `
        <section class="card">
          <div class="card-title">AIM-5 Allocation Frame</div>
          <div class="allocation-list">
            ${allocation.map(item => {
              const pct = clampScore(item.target_pct);
              const actual = actualBySleeve.get(sleeveKey(item.sleeve));
              return `
                <div class="allocation-item">
                  <div class="allocation-head">
                    <div class="allocation-name">${escapeHtml(item.sleeve)}</div>
                    <div class="allocation-pct">${pct}%</div>
                  </div>
                  <div class="allocation-bar">
                    <div class="allocation-fill" style="width: ${pct}%"></div>
                  </div>
                  ${actual ? renderActualAllocation(actual) : ""}
                  <div class="allocation-role">${escapeHtml(item.role)}</div>
                </div>
              `;
            }).join("")}
            ${unclassified ? `
              <div class="allocation-item">
                <div class="allocation-head">
                  <div class="allocation-name">${escapeHtml(unclassified.sleeve || "Unclassified / Legacy Holdings")}</div>
                  <div class="allocation-pct">actual</div>
                </div>
                ${renderActualAllocation(unclassified)}
                <div class="allocation-role">Actual private holdings not mapped to current AIM-5 candidate tickers yet.</div>
              </div>
            ` : ""}
          </div>
        </section>
      `;
    }

    function renderSignals(signals) {
      const items = Array.isArray(signals) ? signals : [];
      // Sort by weight × score descending for priority ranking
      const ranked = items.map(s => ({ ...s, priority: (Number(s.weight) || 0) * clampScore(s.score) }))
        .sort((a, b) => b.priority - a.priority);
      const top5 = ranked.slice(0, 5);
      const rest = ranked.slice(5);
      return `
        <section class="card">
          <div class="card-title">Signal Watchlist — Top ${top5.length} by Priority</div>
          <div class="signal-list">
            ${top5.length ? top5.map(signal => {
              const regimeSlug = slug(signal.regime).replace("monetary-reset-risk", "monetary-reset");
              const score = clampScore(signal.score);
              return `
                <article class="signal-item ${regimeSlug}">
                  <div class="signal-head">
                    <div class="signal-name">${escapeHtml(signal.name)}</div>
                    <div class="signal-score">${score}</div>
                  </div>
                  <div class="signal-tags">
                    <span class="tag">${escapeHtml(titleize(signal.regime))}</span>
                    <span class="tag">Weight ${escapeHtml(signal.weight ?? "n/a")}</span>
                    ${signal.value_label ? `<span class="tag">${escapeHtml(signal.value_label)}</span>` : ""}
                    <span class="tag">${escapeHtml(freshnessLabel(signal.freshness || "unknown"))}</span>
                    ${Number.isFinite(Number(signal.age_days)) ? `<span class="tag">${escapeHtml(Number(signal.age_days))}d old</span>` : ""}
                  </div>
                  <div class="signal-note">${escapeHtml(signal.note || "")}</div>
                  <div class="provenance-line">Source: ${escapeHtml(signal.source || "unknown")} · observed ${escapeHtml(signal.as_of || "unknown")}</div>
                </article>
              `;
            }).join("") : `<div class="empty-state">No source signals yet. Run scripts/score_aim_macro.py to generate the local starter ledger.</div>`}
          </div>
          ${rest.length ? `
            <details style="margin-top:10px;">
              <summary style="color:var(--text-dim);font-size:11px;cursor:pointer;padding:5px;">Show ${rest.length} more signals</summary>
              <div class="signal-list" style="margin-top:8px;">
                ${rest.map(signal => {
                  const regimeSlug = slug(signal.regime).replace("monetary-reset-risk", "monetary-reset");
                  const score = clampScore(signal.score);
                  return `
                    <article class="signal-item ${regimeSlug}" style="opacity:0.7;">
                      <div class="signal-head">
                        <div class="signal-name">${escapeHtml(signal.name)}</div>
                        <div class="signal-score" style="font-size:14px;">${score}</div>
                      </div>
                      <div class="signal-note">${escapeHtml(signal.note || "")}</div>
                      <div class="provenance-line">Source: ${escapeHtml(signal.source || "unknown")} · observed ${escapeHtml(signal.as_of || "unknown")}</div>
                    </article>
                  `;
                }).join("")}
              </div>
            </details>
          ` : ""}
        </section>
      `;
    }

    function renderSectionDivider(label) {
      return `<div style="text-align:center;margin:16px 0 10px;padding:6px;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);">${escapeHtml(label)}</div>`;
    }

    async function loadWatchlistData() {
      try {
        const response = await fetch("aim-technical-watchlist.json", { cache: "no-store" });
        if (!response.ok) return null;
        return await response.json();
      } catch { return null; }
    }

    function renderDeploymentGauge(watchlist) {
      if (!watchlist || !Array.isArray(watchlist.symbols)) {
        return `<section class="card"><div class="card-title">🎯 Deployment Trigger Gauge</div><div class="empty-state">Technical watchlist unavailable. Run shrike_aim_technical_watchlist.py to generate.</div></section>`;
      }
      // v0.4 deployment triggers: AI basket down 12-15%, 20-25%, 30%+
      const aiBasket = ['NVDA', 'AVGO', 'TSM', 'ASML', 'GOOGL', 'GOOG', 'TER', 'GEV'];
      let maxDrawdown = 0;
      let worstTicker = '';
      let sumDrawdown = 0;
      const drawdowns = [];
      for (const sym of watchlist.symbols) {
        if (aiBasket.includes(sym.symbol)) {
          const ddRaw = Number(sym.drawdown_from_252d_high);
          if (!Number.isFinite(ddRaw)) continue;
          const dd = Math.abs(ddRaw);
          drawdowns.push({ ticker: sym.symbol, drawdown: dd });
          sumDrawdown += dd;
          if (dd > maxDrawdown) { maxDrawdown = dd; worstTicker = sym.symbol; }
        }
      }
      // Fail closed: if we don't have enough AI-basket symbols, don't report "no trigger"
      const basketCoverage = drawdowns.length;
      if (basketCoverage < 4) {
        return `<section class="card"><div class="card-title">🎯 Deployment Trigger Gauge</div><div class="empty-state">Insufficient AI-basket coverage in watchlist (${basketCoverage}/${aiBasket.length} symbols found). Cannot compute deployment trigger status.</div></section>`;
      }
      drawdowns.sort((a, b) => b.drawdown - a.drawdown);
      // Equal-weighted basket drawdown (the thesis signal), with worst constituent for context
      const basketDrawdown = sumDrawdown / basketCoverage;

      const trigger1 = 12; // first trigger
      const trigger2 = 20; // second trigger
      const trigger3 = 30; // third trigger

      let status, color, context;
      if (basketDrawdown >= trigger3) {
        status = '🔴 Deep Drawdown Zone (30%+ basket avg)';
        color = 'var(--red)';
        context = 'AI basket in deep drawdown. v0.4 thesis says deploy highest-quality only at this level.';
      } else if (basketDrawdown >= trigger2) {
        status = '🟠 Significant Drawdown Zone (20-25% basket avg)';
        color = 'var(--amber)';
        context = 'AI basket in significant drawdown. v0.4 thesis defines this as a second deployment review zone.';
      } else if (basketDrawdown >= trigger1) {
        status = '🟡 First Trigger Zone (12-15% basket avg)';
        color = 'var(--amber)';
        context = 'AI basket entering drawdown. v0.4 thesis defines this as the first deployment review zone.';
      } else {
        status = '🟢 No Trigger — Normal Accumulation';
        color = 'var(--green)';
        context = 'AI basket not in drawdown territory. No v0.4 deployment triggers active.';
      }

      const gaugePct = Math.min(100, (basketDrawdown / trigger3) * 100);

      return `
        <section class="card">
          <div class="card-title">🎯 Deployment Trigger Gauge</div>
          <div style="font-size:14px;font-weight:650;color:${color};margin-bottom:8px;">${status}</div>
          <div style="background:rgba(255,255,255,0.08);border-radius:8px;height:24px;overflow:hidden;position:relative;margin-bottom:8px;">
            <div style="height:100%;width:${gaugePct.toFixed(0)}%;background:linear-gradient(90deg,var(--green),var(--amber),var(--red));border-radius:8px;transition:width 400ms;"></div>
            <div style="position:absolute;top:0;left:${(trigger1/trigger3*100).toFixed(0)}%;width:1px;height:100%;background:rgba(255,255,255,0.3);"></div>
            <div style="position:absolute;top:0;left:${(trigger2/trigger3*100).toFixed(0)}%;width:1px;height:100%;background:rgba(255,255,255,0.3);"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-dim);margin-bottom:10px;">
            <span>0%</span><span>12% trigger</span><span>20% trigger</span><span>30%+ trigger</span>
          </div>
          <div style="font-size:12px;color:var(--text);line-height:1.4;margin-bottom:8px;">${context}</div>
          <div style="font-size:11px;color:var(--text-dim);">
            Basket avg drawdown: <strong style="color:var(--text);">${basketDrawdown.toFixed(1)}%</strong> · Worst: ${worstTicker} ${maxDrawdown.toFixed(1)}%
          </div>
          <div style="margin-top:6px;font-size:10px;color:var(--text-dim);">
            ${drawdowns.slice(0, 5).map(d => `${d.ticker} ${d.drawdown.toFixed(1)}%`).join(' · ')}
          </div>
        </section>
      `;
    }

    function renderDriftView(portfolioOverlay) {
      const actual = portfolioOverlay?.aim?.actual_allocation;
      if (!actual?.available || !Array.isArray(actual.sleeves)) {
        return '';
      }
      // Target allocation from the cache
      const targets = [
        { sleeve_key: 'ai_productive_equity', label: 'AI Productive Equity', target: 46 },
        { sleeve_key: 'agent_toll_collectors', label: 'Agent Toll Collectors', target: 11 },
        { sleeve_key: 'energy_power_real_assets', label: 'Energy / Power', target: 9.5 },
        { sleeve_key: 'hard_money', label: 'Hard Money', target: 7.5 },
        { sleeve_key: 'healthcare_defense', label: 'Healthcare / Defense', target: 13 },
        { sleeve_key: 'critical_minerals', label: 'Critical Minerals', target: 6 },
        { sleeve_key: 'runway_optionality', label: 'Runway / Dry Powder', target: 7 },
      ];
      const actualMap = new Map(actual.sleeves.map(s => [s.sleeve_key, s]));
      const unclassified = actualMap.get('unclassified');

      const rows = targets.map(t => {
        const a = actualMap.get(t.sleeve_key);
        const actualPct = a ? Number(a.actual_pct) : 0;
        const drift = actualPct - t.target;
        const driftCls = Math.abs(drift) < 1 ? 'var(--green)' : drift > 0 ? 'var(--amber)' : 'var(--blue)';
        return `
          <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
            <div style="flex:1;font-size:11px;color:var(--text-dim);">${t.label}</div>
            <div style="font-size:11px;color:var(--text);min-width:45px;text-align:right;">${actualPct.toFixed(1)}%</div>
            <div style="font-size:10px;color:var(--text-dim);min-width:35px;text-align:right;">/ ${t.target}%</div>
            <div style="font-size:10px;color:${driftCls};min-width:40px;text-align:right;">${drift >= 0 ? '+' : ''}${drift.toFixed(1)}%</div>
          </div>
        `;
      }).join('');

      const unclassifiedRow = unclassified ? `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <div style="flex:1;font-size:11px;color:var(--text-dim);font-style:italic;">Unclassified / Cash</div>
          <div style="font-size:11px;color:var(--text-dim);min-width:45px;text-align:right;">${Number(unclassified.actual_pct).toFixed(1)}%</div>
          <div style="font-size:10px;color:var(--text-dim);min-width:35px;text-align:right;">/ 0%</div>
          <div style="font-size:10px;color:var(--amber);min-width:40px;text-align:right;">+${Number(unclassified.actual_pct).toFixed(1)}%</div>
        </div>
      ` : '';

      return `
        <section class="card">
          <div class="card-title">📊 Portfolio Drift (Private)</div>
          <div style="display:flex;align-items:center;gap:8px;padding:4px 0 6px;font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);">
            <div style="flex:1;">Sleeve</div>
            <div style="min-width:45px;text-align:right;">Actual</div>
            <div style="min-width:35px;text-align:right;">Target</div>
            <div style="min-width:40px;text-align:right;">Drift</div>
          </div>
          ${rows}
          ${unclassifiedRow}
          <div style="font-size:10px;color:var(--text-dim);margin-top:8px;line-height:1.35;">
            Positive drift = overweight. Negative = underweight (deployable). Unclassified = cash or legacy holdings not mapped to v0.4 sleeves.
          </div>
        </section>
      `;
    }

    function renderDebate(question) {
      return `
        <section class="card">
          <div class="card-title">Debate Question</div>
          <div class="debate-question">${escapeHtml(question || SAMPLE_DATA.debate_question)}</div>
        </section>
      `;
    }

    function renderRule() {
      return `
        <footer class="card rule-card">
          Decision support only. No trades, reallocations, or broker/account actions without explicit Doug approval.
        </footer>
      `;
    }

    async function init() {
      const [{ data, usedDemo }, portfolioOverlay, watchlist] = await Promise.all([loadCache(), loadPortfolioOverlay(), loadWatchlistData()]);
      document.getElementById("demoWarning").classList.toggle("show", usedDemo);
      document.getElementById("app").innerHTML = [
        renderSectionDivider("Portfolio Readiness"),
        renderRetirementCockpit(portfolioOverlay),
        renderDriftView(portfolioOverlay),
        renderSectionDivider("Macro Regime & Deployment"),
        renderDeploymentGauge(watchlist),
        renderPosture(data),
        renderScores(data),
        renderAllocation(data.aim5_allocation, portfolioOverlay),
        renderSignals(data.dashboard_signals || data.signals),
        renderDebate(data.debate_question),
        renderRule()
      ].join("");
    }

    init();
  </script>
</body>
</html>
